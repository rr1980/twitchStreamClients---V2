<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Multi-Viewer Ultimate</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9146FF">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Twitch Embed API -->
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        twitch: { DEFAULT: '#9146FF', dark: '#772CE8', darker: '#5C16C5' },
                        dark: { 900: '#0e0e10', 800: '#18181b', 700: '#1f1f23', 600: '#303033' }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.2s ease-out',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0e0e10;
            color: #efeff1;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #stream-container {
            display: grid;
            gap: 2px;
            width: 100vw;
            height: 100vh;
            background: #000;
            transition: all 0.3s ease;
        }

        .twitch-embed-wrapper {
            width: 100%;
            height: 100%;
            background: #18181b;
            position: relative;
        }

        #menu-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(24, 24, 27, 0.8);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border: 1px solid #303033;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #menu-trigger:hover {
            background: #9146FF;
            border-color: #9146FF;
            transform: scale(1.05);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #303033; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9146FF; }

        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

    <!-- Menu Button -->
    <button id="menu-trigger" onclick="ui.toggleMenu(true)" title="Menü (Hotkey: M)">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
    </button>

    <!-- Main Stream Container -->
    <main id="stream-container"></main>

    <!-- Modal Menu -->
    <div id="settings-menu" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-4 animate-fade-in">
        <div class="bg-dark-800 border border-dark-600 w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col h-[85vh] animate-slide-up">
            
            <div class="p-6 border-b border-dark-600 flex justify-between items-center bg-dark-700 rounded-t-2xl">
                <div class="flex items-center gap-3">
                    <div class="bg-twitch p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-white leading-tight">Twitch Multi-Viewer</h2>
                        <span class="text-xs text-twitch font-semibold uppercase tracking-wider">Ultimate Edition</span>
                    </div>
                </div>
                <button onclick="ui.toggleMenu(false)" class="text-gray-400 hover:text-white hover:bg-dark-600 p-2 rounded-xl transition-all" title="Schließen (Esc)">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col md:flex-row">
                
                <!-- Left Col -->
                <div class="flex-1 p-6 border-r border-dark-600 flex flex-col gap-6 overflow-y-auto">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-widest">Kanal hinzufügen</label>
                        <!-- Formular sauber an Event-Handler gebunden -->
                        <form onsubmit="actions.addStream(event)" class="flex gap-2 relative">
                            <input type="text" id="stream-input" list="history-datalist" placeholder="z.B. rocketbeanstv" 
                                   class="flex-1 bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 focus:border-twitch focus:ring-1 focus:ring-twitch focus:outline-none transition-all text-white placeholder-gray-600">
                            <datalist id="history-datalist"></datalist>
                            <button type="submit" class="bg-twitch hover:bg-twitch-dark text-white px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-twitch/20" title="Add">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </form>
                    </div>

                    <div class="flex-1 flex flex-col min-h-0">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-xs font-bold uppercase text-gray-500 tracking-widest">Aktuelles Lineup</label>
                            <span id="stream-count-badge" class="text-xs bg-dark-600 px-2 py-1 rounded text-gray-300">0 Streams</span>
                        </div>
                        <div id="active-list" class="space-y-2 overflow-y-auto flex-1 pr-2"></div>
                    </div>
                </div>

                <!-- Right Col -->
                <div class="w-full md:w-80 p-6 flex flex-col gap-8 bg-dark-700/50 overflow-y-auto">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-3 tracking-widest">Video Qualität</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex flex-col items-center justify-center cursor-pointer bg-dark-900 p-3 rounded-xl border border-dark-600 hover:border-twitch transition-colors">
                                <input type="radio" name="quality" value="auto" class="hidden peer">
                                <span class="text-sm font-semibold text-gray-300 peer-checked:text-twitch">Auto</span>
                            </label>
                            <label class="flex flex-col items-center justify-center cursor-pointer bg-dark-900 p-3 rounded-xl border border-dark-600 hover:border-twitch transition-colors">
                                <input type="radio" name="quality" value="480p" class="hidden peer">
                                <span class="text-sm font-semibold text-gray-300 peer-checked:text-twitch">480p</span>
                            </label>
                            <label class="flex flex-col items-center justify-center cursor-pointer bg-dark-900 p-3 rounded-xl border border-dark-600 hover:border-twitch transition-colors">
                                <input type="radio" name="quality" value="720p60" class="hidden peer">
                                <span class="text-sm font-semibold text-gray-300 peer-checked:text-twitch">720p60</span>
                            </label>
                            <label class="flex flex-col items-center justify-center cursor-pointer bg-dark-900 p-3 rounded-xl border border-dark-600 hover:border-twitch transition-colors">
                                <input type="radio" name="quality" value="chunked" class="hidden peer">
                                <span class="text-sm font-semibold text-gray-300 peer-checked:text-twitch">Source</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-3 tracking-widest">Ansicht</label>
                        <label class="flex items-center justify-between cursor-pointer bg-dark-900 p-4 rounded-xl border border-dark-600 hover:border-twitch transition-colors">
                            <span class="text-sm font-semibold text-gray-300">Twitch Chat anzeigen</span>
                            <div class="relative">
                                <input type="checkbox" id="chat-toggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-dark-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-twitch"></div>
                            </div>
                        </label>
                    </div>

                    <div class="mt-auto pt-6">
                        <button onclick="actions.applyChanges()" class="w-full bg-white text-black hover:bg-gray-200 p-4 rounded-xl font-bold transition-all shadow-xl flex justify-center items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Anwenden & Schließen
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT (Mit Auto-Fixer)
        // ==========================================
        const state = {
            get streams() { 
                try {
                    const raw = localStorage.getItem('streams_v2') || '[]';
                    let parsed = JSON.parse(raw);
                    
                    // AUTO-FIX: [object Object] aus alten Caches entfernen
                    parsed = parsed.map(item => {
                        if (typeof item === 'object' && item !== null) {
                            return item.name || item.id || '';
                        }
                        return String(item);
                    });
                    
                    return parsed.filter(s => s.trim().length > 0 && s !== '[object Object]');
                } catch(e) {
                    return [];
                }
            },
            set streams(val) { 
                const cleanArray = val.filter(s => typeof s === 'string' && s.trim().length > 0);
                localStorage.setItem('streams_v2', JSON.stringify(cleanArray)); 
            },
            
            get quality() { return localStorage.getItem('quality_v2') || 'auto'; },
            set quality(val) { localStorage.setItem('quality_v2', val); },
            
            get showChat() { return localStorage.getItem('showChat_v2') === 'true'; },
            set showChat(val) { localStorage.setItem('showChat_v2', val); },
            
            get statistics() {
                try {
                    return JSON.parse(localStorage.getItem('stats_v2') || '[]');
                } catch (e) {
                    return [];
                }
            },
            set statistics(val) { localStorage.setItem('stats_v2', JSON.stringify(val)); }
        };

        // Migration alter Daten
        if (localStorage.getItem('streams') && !localStorage.getItem('streams_v2')) {
            try {
                state.streams = JSON.parse(localStorage.getItem('streams') || '[]');
                state.quality = localStorage.getItem('streams_qualities') || localStorage.getItem('streams_qualies') || 'auto';
            } catch(e) { }
        }

        // ==========================================
        // 1.5 INPUT/OUTPUT SAFETY HELPERS
        // ==========================================
        const helpers = {
            escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            },
            escapeAttr(value) {
                return this.escapeHtml(value);
            },
            normalizeChannelName(value) {
                return String(value)
                    .trim()
                    .toLowerCase()
                    .replace(/,/g, '');
            },
            isValidChannelName(value) {
                // Twitch Login-Namen bestehen aus a-z, 0-9, _ (max. 25 Zeichen)
                return /^[a-zäöü0-9_]{1,25}$/.test(String(value));
            }
        };

        // ==========================================
        // 2. CORE LOGIC
        // ==========================================
        const logic = {
            updateStatistic(channelName) {
                let stats = state.statistics;
                const idx = stats.findIndex(s => s.name === channelName);
                if (idx > -1) { stats[idx].value += 1; } 
                else { stats.push({ name: channelName, value: 1 }); }
                state.statistics = stats;
            },
            
            calculateOptimalGrid(count, containerWidth, containerHeight) {
                if (count === 0) return { cols: 1, rows: 1 };
                let bestCols = 1, bestRows = 1, maxArea = 0;

                for (let cols = 1; cols <= count; cols++) {
                    const rows = Math.ceil(count / cols);
                    const cellWidth = containerWidth / cols;
                    const cellHeight = containerHeight / rows;
                    const targetRatio = state.showChat ? (21/9) : (16/9); 
                    
                    let vidWidth = cellWidth;
                    let vidHeight = cellWidth / targetRatio;
                    
                    if (vidHeight > cellHeight) {
                        vidHeight = cellHeight;
                        vidWidth = cellHeight * targetRatio;
                    }

                    const totalArea = (vidWidth * vidHeight) * count;
                    if (totalArea > maxArea) {
                        maxArea = totalArea;
                        bestCols = cols;
                        bestRows = rows;
                    }
                }
                return { cols: bestCols, rows: bestRows };
            }
        };

        // ==========================================
        // 3. UI RENDERING & ACTIONS
        // ==========================================
        let hasChanges = false; 

        const ui = {
            toggleMenu(show) {
                const menu = document.getElementById('settings-menu');
                if (show) {
                    menu.classList.remove('hidden');
                    menu.classList.add('flex');
                    this.syncSettingsToUI();
                    this.renderActiveList();
                    this.renderDatalist();
                    hasChanges = false;
                    setTimeout(() => document.getElementById('stream-input').focus(), 100);
                } else {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                    if (hasChanges) {
                        this.showToast('Setup wird dynamisch geladen...', 'info');
                        this.initStreams(); 
                        hasChanges = false;
                    }
                }
            },

            syncSettingsToUI() {
                document.querySelectorAll(`input[name="quality"]`).forEach(el => {
                    const span = el.nextElementSibling;
                    if(el.value === state.quality) {
                        el.checked = true;
                        span.classList.add('text-twitch');
                        el.parentElement.classList.add('border-twitch', 'bg-dark-700');
                    } else {
                        span.classList.remove('text-twitch');
                        el.parentElement.classList.remove('border-twitch', 'bg-dark-700');
                    }
                    
                    // Wichtig: kein addEventListener hier, sonst duplizieren sich Handler beim erneuten Öffnen des Menüs.
                    el.onchange = (e) => {
                        document.querySelectorAll(`input[name="quality"]`).forEach(radio => {
                            radio.nextElementSibling.classList.remove('text-twitch');
                            radio.parentElement.classList.remove('border-twitch', 'bg-dark-700');
                        });
                        e.target.nextElementSibling.classList.add('text-twitch');
                        e.target.parentElement.classList.add('border-twitch', 'bg-dark-700');
                        state.quality = e.target.value;
                        hasChanges = true;
                    };
                });

                const chatToggle = document.getElementById('chat-toggle');
                chatToggle.checked = state.showChat;
                chatToggle.onchange = (e) => {
                    state.showChat = e.target.checked;
                    hasChanges = true;
                };
            },

            renderActiveList() {
                const container = document.getElementById('active-list');
                const badge = document.getElementById('stream-count-badge');
                const streams = state.streams;

                badge.innerText = `${streams.length} Stream${streams.length !== 1 ? 's' : ''}`;

                if (streams.length === 0) {
                    container.innerHTML = `
                        <div class="h-32 flex flex-col items-center justify-center text-gray-500 border border-dashed border-dark-600 rounded-xl">
                            <p class="text-sm">Noch keine Streams aktiv.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = streams.map((s, i) => {
                    const safeName = helpers.escapeHtml(s);
                    return `
                        <div class="flex items-center gap-3 bg-dark-900 p-3 rounded-xl border border-dark-600 group hover:border-dark-600 transition-all">
                            <div class="flex flex-col gap-1 text-gray-500 hover:text-white">
                                <button onclick="actions.moveStream(${i}, -1)" class="${i===0 ? 'invisible':''} hover:text-twitch" title="Hoch"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg></button>
                                <button onclick="actions.moveStream(${i}, 1)" class="${i===streams.length-1 ? 'invisible':''} hover:text-twitch" title="Runter"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                            </div>
                            <div class="w-8 h-8 bg-dark-700 rounded-full flex items-center justify-center font-bold text-xs text-twitch">${i+1}</div>
                            <span class="flex-1 font-bold text-white text-lg truncate">${safeName}</span>
                            <button onclick="actions.removeStream(${i})" title="Entfernen" class="w-10 h-10 flex items-center justify-center rounded-lg bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                }).join('');
            },

            renderDatalist() {
                const dl = document.getElementById('history-datalist');
                const sortedStats = [...state.statistics].sort((a, b) => b.value - a.value).slice(0, 10);
                dl.innerHTML = sortedStats.map(s => `<option value="${helpers.escapeAttr(s.name)}">`).join('');
            },

            showToast(msg, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                const colors = type === 'success' ? 'bg-green-500/90' : (type === 'error' ? 'bg-red-500/90' : 'bg-twitch/90');
                
                toast.className = `${colors} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-semibold flex items-center gap-2 transform transition-all duration-300 translate-y-10 opacity-0 backdrop-blur-sm`;
                toast.innerHTML = msg;
                container.appendChild(toast);
                
                requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
                setTimeout(() => {
                    toast.classList.add('opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            updateGridStyles() {
                const container = document.getElementById('stream-container');
                const count = state.streams.length;
                if (count === 0) return;

                const grid = logic.calculateOptimalGrid(count, window.innerWidth, window.innerHeight);
                container.style.gridTemplateColumns = `repeat(${grid.cols}, 1fr)`;
                container.style.gridTemplateRows = `repeat(${grid.rows}, 1fr)`;
            },

            initStreams() {
                const container = document.getElementById('stream-container');
                const streams = state.streams;
                const quality = state.quality;
                const layout = state.showChat ? 'video-with-chat' : 'video';

                container.innerHTML = '';

                if (streams.length === 0) {
                    container.style.display = 'flex';
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center w-full h-full space-y-6 animate-fade-in">
                            <h1 class="text-3xl font-bold text-white tracking-tight">Dein Setup ist leer</h1>
                            <button onclick="ui.toggleMenu(true)" class="bg-twitch hover:bg-twitch-dark text-white px-8 py-4 rounded-xl font-bold transition-all transform hover:scale-105">
                                Streams konfigurieren
                            </button>
                        </div>
                    `;
                    return;
                }

                container.style.display = 'grid';
                this.updateGridStyles();

                streams.forEach((channel, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'twitch-embed-wrapper animate-fade-in';
                    wrapper.id = `twitch-embed-${i}`;
                    container.appendChild(wrapper);

                    const embed = new Twitch.Embed(wrapper.id, {
                        width: '100%',
                        height: '100%',
                        channel: channel,
                        layout: layout,
                        autoplay: true,
                        muted: i !== 0, 
                        parent: [window.location.hostname || 'localhost']
                    });

                    embed.addEventListener(Twitch.Embed.READY, () => {
                        const player = embed.getPlayer();
                        setTimeout(() => {
                            try { player.setQuality(quality); } 
                            catch(e) { console.warn("Quality Set Error:", e); }
                        }, 1500);
                    });
                });
            }
        };

        const actions = {
            addStream(event) {
                if (event) event.preventDefault(); 
                
                const input = document.getElementById('stream-input');
                const name = helpers.normalizeChannelName(input.value);
                
                if (!name || name === '[object object]') return;
                if (!helpers.isValidChannelName(name)) {
                    ui.showToast('Ungültiger Kanalname. Erlaubt: a-z, äöü, 0-9, _ (max. 25 Zeichen).', 'error');
                    return;
                }

                const current = state.streams;
                if (!current.includes(name)) {
                    current.push(name);
                    state.streams = current;
                    logic.updateStatistic(name);
                    input.value = '';
                    ui.renderActiveList();
                    hasChanges = true;
                    ui.showToast(`<b>${helpers.escapeHtml(name)}</b> hinzugefügt!`);
                } else {
                    ui.showToast(`<b>${helpers.escapeHtml(name)}</b> ist bereits aktiv.`, 'error');
                }
            },

            removeStream(index) {
                const current = state.streams;
                const name = current[index];
                current.splice(index, 1);
                state.streams = current;
                ui.renderActiveList();
                hasChanges = true;
                ui.showToast(`<b>${helpers.escapeHtml(name)}</b> entfernt.`);
            },

            moveStream(index, direction) {
                const current = state.streams;
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= current.length) return;
                
                [current[index], current[newIndex]] = [current[newIndex], current[index]];
                state.streams = current;
                ui.renderActiveList();
                hasChanges = true;
            },

            applyChanges() {
                ui.toggleMenu(false); 
            }
        };

        // ==========================================
        // 4. LIFECYCLE & EVENTS
        // ==========================================
        window.onload = () => {
            ui.initStreams();
            
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(() => ui.updateGridStyles(), 200);
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') ui.toggleMenu(false);
                if (e.key.toLowerCase() === 'm' && document.activeElement.tagName !== 'INPUT') {
                    const menu = document.getElementById('settings-menu');
                    ui.toggleMenu(menu.classList.contains('hidden'));
                }
            });
        };

        // ==========================================
        // 5. SERVICE WORKER REGISTRATION (PWA)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => console.log('[ServiceWorker] Registriert:', registration.scope))
                    .catch(error => console.warn('[ServiceWorker] Fehler:', error));
            });
        }
    </script>
</body>
</html>
